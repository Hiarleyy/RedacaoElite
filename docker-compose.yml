services:
  db:
    image: bitnamilegacy/postgresql:17.6.0-debian-12-r4
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=docker
      - POSTGRESQL_DATABASE=BDPlataformaRedacao
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/bitnami/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "BDPlataformaRedacao"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1

  backend:
    image: hiarley/redacaoelite-backend:latest
    environment:
      - DATABASE_URL=postgresql://postgres:docker@db:5432/BDPlataformaRedacao?schema=public
      - HTTP_PORT=3000
      - HOST=0.0.0.0
      - JWT_SENHA=senha-super-secreta
    volumes:
      - uploads_data:/app/src/uploads
    networks:
      - web
      - internal
    depends_on:
      - db
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=plataforma-redacao-web"

        # API -> backend:3000 (remove /api)
        - "traefik.http.routers.backend-api.rule=Host(`redacaoelite.com`) && PathPrefix(`/api`)"
        - "traefik.http.routers.backend-api.entrypoints=websecure"
        - "traefik.http.routers.backend-api.tls=true"
        - "traefik.http.routers.backend-api.tls.certresolver=le"
        - "traefik.http.routers.backend-api.priority=100"
        - "traefik.http.routers.backend-api.middlewares=backend-stripprefix"
        - "traefik.http.middlewares.backend-stripprefix.stripprefix.prefixes=/api"
        - "traefik.http.routers.backend-api.service=backend-service"

        # Uploads
        - "traefik.http.routers.backend-uploads.rule=Host(`redacaoelite.com`) && PathPrefix(`/uploads`)"
        - "traefik.http.routers.backend-uploads.entrypoints=websecure"
        - "traefik.http.routers.backend-uploads.tls=true"
        - "traefik.http.routers.backend-uploads.tls.certresolver=le"
        - "traefik.http.routers.backend-uploads.priority=100"
        - "traefik.http.routers.backend-uploads.service=backend-service"

        - "traefik.http.services.backend-service.loadbalancer.server.port=3000"

  frontend:
    image: hiarley/redacaoelite-frontend:latest
    networks:
      - web
    depends_on:
      - backend
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=plataforma-redacao-web"
        - "traefik.http.routers.frontend.rule=Host(`redacaoelite.com`)"
        - "traefik.http.routers.frontend.entrypoints=websecure"
        - "traefik.http.routers.frontend.tls=true"
        - "traefik.http.routers.frontend.tls.certresolver=le"
        - "traefik.http.routers.frontend.priority=10"
        - "traefik.http.services.frontend.loadbalancer.server.port=80"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - web
      - internal
    deploy:
      replicas: 1

volumes:
  postgres_data:
  minio_data:
  uploads_data:

networks:
  web:
    name: plataforma-redacao-web
    external: true

  internal:
    name: plataforma-redacao-internal
    driver: overlay
    attachable: true